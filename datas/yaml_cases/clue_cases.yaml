# 线索管理接口测试用例
# 测试人员直接编辑此文件即可维护用例，无需修改 Python 代码
#
# 格式说明:
#   name:        用例名称
#   api:         接口路径
#   method:      请求方法
#   account:     使用哪个账号 (对应 config/users.yaml 中的 key)
#   data:        请求参数 (@xxx 动态生成, ${xxx} 从上游取)
#   extract:     从响应中提取值存入上下文
#   assert:      断言规则
#   skip:        是否跳过 (true/false)

# ─── 添加线索（完整字段） ─────────────────────────────
add_clue:
  name: 添加线索
  api: /api/admin/customer-clue/add
  method: post
  account: sale_account_1
  data:
    status: "1"
    nickname: "@nickname"
    sale_user_id: ""
    assistant_user_id: ""
    marketing_user_id: ""
    founder: ""
    source: "1"
    customer_name: "@company"
    business_license_code: "@license"
    customer_short_name: "@company"
    customer_fixed_line: ""
    legal_person: ""
    gmt_establish: ""
    regist_amount: ""
    insure: "@int"
    bc_Address[0]: "@province"
    bc_Address[1]: "@city"
    bc_Address[2]: "@town"
    province: "@province"
    city: "@city"
    town: "@town"
    area: ""
    address: "@address"
    geo_address: ""
    website: ""
    ground_name: ""
    project_area: ""
    day_settlement_time: "2023-04-07T00:00:00.000Z"
    daily_settle_time: "1680825600"
    normal_wait_time_limit: ""
    night_shift: "0"
    bc_shift_num_val: ""
    night_shift_num: ""
    day_shift_num: ""
    night_shift_start: ""
    night_shift_end: ""
    third_month_avg_settle: "0"
    scale: ""
    worker_scale: ""
    temporary_scale: ""
    temporary_wages: ""
    customer_brand: ""
    industry: ""
    industry_remark: ""
    technology_type: ""
    technology_remark: ""
    product: ""
    intention_degree: ""
    automation_degree: ""
    estimate_num: ""
    remark: "@remark"
    supple_remark: ""
    external_remark: ""
    scene_remark: ""
    product_remark: ""
    workmanship_remark: ""
    recommend_remark: ""
    external_media_archive_id: ""
    scene_media_archive_id: ""
    product_media_archive_id: ""
    workmanship_media_archive_id: ""
    recommend_work_station_archive_id: ""
    retract: ""
    introduce_customer_license_code: ""
    introduce_user_id: ""
    exhibition_date: ""
    exhibition_name: ""
    gmt_create: "@today"
    add_source: "1"
    docking_person: '[{"docking_person_name":"@nickname","docking_person_phone":"@phone","docking_person_department":"","docking_person_position":"测试工程师","docking_person_type":"1","docking_person_remark":""}]'
  extract:
    clue_id: data.id
    clue_name: data.customer_name
  assert:
    - path: code
      operator: in
      expect: [200, 0]
    - path: data.id
      operator: not_null
  skip: false

